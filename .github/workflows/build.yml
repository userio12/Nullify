name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        id: build-debug
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee gradle-debug.log

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-*.apk
          if-no-files-found: error

      - name: Build Release APK (unsigned)
        id: build-release
        run: ./gradlew assembleRelease --stacktrace 2>&1 | tee gradle-release.log

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-*.apk
          if-no-files-found: error

      - name: Upload build reports and logs (even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            gradle-debug.log
            gradle-release.log
            build/reports/
            app/build/reports/
          if-no-files-found: warn
